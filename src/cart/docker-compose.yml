services:
  cart:
    build:
      context: .
    depends_on:
      dynamodb:
        condition: service_healthy
        restart: true
    restart: always
    cap_drop:
      - all
    security_opt:
      - no-new-privileges:true
    environment:
      - RETAIL_CART_PERSISTENCE_PROVIDER=dynamodb
      - RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT=http://dynamodb:8000
      - RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE=true
      - RETAIL_CART_PERSISTENCE_DYNAMODB_TABLE_NAME=Items
      # Dummy credentials required by AWS SDK even for local DynamoDB
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "8082:8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  dynamodb:
    image: amazon/dynamodb-local:latest
    restart: always
    security_opt:
      - no-new-privileges:true
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000 | grep -q 400 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
