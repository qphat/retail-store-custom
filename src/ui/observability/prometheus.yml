global:
  scrape_interval: 15s      # scrape every 15 seconds
  evaluation_interval: 15s  # evaluate rules every 15 seconds

scrape_configs:
  - job_name: catalog
    static_configs:
      - targets: ['catalog:8080']
    metrics_path: /metrics

  - job_name: cart
    static_configs:
      - targets: ['cart:8080']
    metrics_path: /actuator/prometheus

  - job_name: orders
    static_configs:
      - targets: ['orders:8080']
    metrics_path: /actuator/prometheus

  - job_name: checkout
    static_configs:
      - targets: ['checkout:8080']
    metrics_path: /metrics

  - job_name: ui
    static_configs:
      - targets: ['ui:8080']
    metrics_path: /actuator/prometheus
