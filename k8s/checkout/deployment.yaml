apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: koomi1/retail-app-checkout:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
              value: "in-memory"
            - name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
              value: "http://orders"   # calls the orders Service by DNS name
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
