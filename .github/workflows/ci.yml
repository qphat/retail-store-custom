name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Detect which services changed
  # Outputs a JSON array, e.g. ["catalog","cart"]
  # Used by the matrix job below
  # ──────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Root files are inlined in every service filter.
            # If nx.json / yarn.lock / etc. change → all services rebuild.

            catalog:
              - 'nx.json'
              - '.mise.toml'
              - 'package.json'
              - 'yarn.lock'
              - 'src/catalog/**'

            cart:
              - 'nx.json'
              - '.mise.toml'
              - 'package.json'
              - 'yarn.lock'
              - 'src/cart/**'

            orders:
              - 'nx.json'
              - '.mise.toml'
              - 'package.json'
              - 'yarn.lock'
              - 'src/orders/**'

            checkout:
              - 'nx.json'
              - '.mise.toml'
              - 'package.json'
              - 'yarn.lock'
              - 'src/checkout/**'

            ui:
              - 'nx.json'
              - '.mise.toml'
              - 'package.json'
              - 'yarn.lock'
              - 'src/ui/**'

  # ──────────────────────────────────────────────
  # Job 2: Build matrix — one job per changed service
  #
  # matrix.service comes from the JSON array above.
  # matrix.include attaches runtime metadata to each service name.
  # Setup steps use `if: matrix.runtime == '...'` to pick the right toolchain.
  #
  # Adding a new service = 1 new line in `include` + filter above.
  # ──────────────────────────────────────────────
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    # Skip entire job if nothing changed
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    strategy:
      fail-fast: false   # don't cancel other services if one fails
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
        include:
          - service: catalog
            runtime: go
            cache-dep-path: src/catalog/go.sum

          - service: cart
            runtime: java
            java-version: '21'
            cache-dep-path: src/cart/pom.xml

          - service: orders
            runtime: java
            java-version: '21'
            cache-dep-path: src/orders/pom.xml

          - service: checkout
            runtime: node
            node-version: '22'

          - service: ui
            runtime: java
            java-version: '21'
            cache-dep-path: src/ui/pom.xml

    steps:
      - uses: actions/checkout@v4

      # ── Runtime setup (only the matching step runs) ──

      - name: Set up Go
        if: matrix.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: src/${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.cache-dep-path }}

      - name: Set up Java
        if: matrix.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ matrix.cache-dep-path }}

      - name: Set up Node
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # No cache: Yarn 4 Berry stores cache in a non-standard path that
          # setup-node doesn't know about — causes post-job cleanup to fail

      # ── Docker ──

      - uses: docker/setup-buildx-action@v3

      # Login only on push to main (PRs from forks can't access secrets)
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and load into local daemon (needed for Trivy to scan)
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          push: false
          load: true
          tags: |
            ${{ vars.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ vars.IMAGE_PREFIX }}-${{ matrix.service }}:latest

      # Scan BEFORE push — fail on CRITICAL CVEs with a fix available
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # Push only after scan passes, and only on merge to main
      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          push: true
          tags: |
            ${{ vars.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ vars.IMAGE_PREFIX }}-${{ matrix.service }}:latest
