# Default values — applied to all services unless overridden per-service

imageRegistry: koomi1
imageTag: latest

services:
  catalog:
    image: retail-app-catalog
    port: 8080
    healthPath: /health
    env:
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: in-memory
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  cart:
    image: retail-app-cart
    port: 8080
    healthPath: /actuator/health
    env:
      RETAIL_CART_PERSISTENCE_PROVIDER: in-memory
    resources:
      requests:
        cpu: 128m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # IRSA: annotate the ServiceAccount so the cart pod can assume the IAM role
    # Set this to the cart_irsa_role_arn output from terraform/environments/eks-dev
    # Example: helm upgrade --set services.cart.serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<ARN>
    serviceAccount:
      annotations: {}

  orders:
    image: retail-app-orders
    port: 8080
    healthPath: /actuator/health
    env:
      RETAIL_ORDERS_PERSISTENCE_PROVIDER: in-memory
      RETAIL_ORDERS_MESSAGING_PROVIDER: in-memory
    resources:
      requests:
        cpu: 128m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  checkout:
    image: retail-app-checkout
    port: 8080
    healthPath: /health
    env:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: in-memory
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  ui:
    image: retail-app-ui
    port: 8080
    healthPath: /actuator/health
    env:
      RETAIL_UI_ENDPOINTS_CATALOG: http://catalog
      RETAIL_UI_ENDPOINTS_CARTS: http://cart
      RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout
      RETAIL_UI_ENDPOINTS_ORDERS: http://orders
    resources:
      requests:
        cpu: 128m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

ingress:
  enabled: true
  host: ""   # empty = match all hosts (localhost)

monitoring:
  enabled: true
  prometheus:
    image: prom/prometheus:v2.51.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  grafana:
    image: grafana/grafana:10.4.2
    adminPassword: admin
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

logging:
  enabled: true
  elasticsearch:
    image: elasticsearch:8.13.0
    javaOpts: "-Xms512m -Xmx512m"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  kibana:
    image: kibana:8.13.0
    nodeOptions: "--max-old-space-size=1024"
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 1536Mi
  filebeat:
    image: elastic/filebeat:8.13.0
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 128Mi
