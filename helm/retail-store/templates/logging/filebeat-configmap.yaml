{{- if .Values.logging.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          # Enriches each log line with K8s pod metadata (namespace, pod name, labels)
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"

    processors:
      - drop_fields:
          fields: ["agent", "ecs", "host", "input"]
          ignore_missing: true

    output.elasticsearch:
      hosts: ["elasticsearch:9200"]
      index: "logs-%{[kubernetes.namespace]}-%{+yyyy.MM.dd}"

    # Disable ILM — use simple date-based indices (matches logs-* data view)
    setup.ilm.enabled: false
    setup.template.name: "logs"
    setup.template.pattern: "logs-*"

    logging.level: warning
{{- end }}
