{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  # Provider config — must live in the same directory as the JSON files
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /etc/grafana/provisioning/dashboards
  jvm.json: |
{{ .Files.Get "dashboards/jvm.json" | indent 4 }}
  go.json: |
{{ .Files.Get "dashboards/go.json" | indent 4 }}
{{- end }}
